<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Listo · MixLab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 480px;">
    <div class="card border-0 shadow-sm rounded-4 text-center">
      <div class="card-body p-4">
        <div class="display-6 text-success mb-2"><i class="bi bi-check-circle-fill"></i></div>
        <h1 class="h4 fw-bold">¡Datos enviados!</h1>
        <p class="text-muted">
          Gracias. MixLab revisará tu cédula, ubicación
          {% if req.codeudor_required %}y codeudor {% endif %}
          para continuar con el contrato de alquiler (COT-{{ quote.id }}).
        </p>
      </div>
    </div>
  </div>
</body>
</html>
