<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Acceso requisitos · MixLab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0b1f3a 0%, #12325a 45%, #0f766e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }
    .card-unlock {
      width: 100%;
      max-width: 420px;
      border: none;
      border-radius: 1.25rem;
      box-shadow: 0 20px 50px rgba(0,0,0,.25);
    }
    .brand {
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #0b1f3a;
    }
  </style>
</head>
<body>
  <div class="card card-unlock">
    <div class="card-body p-4">
      <div class="text-center mb-3">
        <div class="brand h4 mb-1">MixLab</div>
        <div class="text-muted small">Requisitos del contrato de alquiler</div>
        <div class="fw-semibold mt-2">COT-{{ quote.id }}</div>
      </div>
      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <p class="small text-muted">
        Ingresa la <strong>contraseña</strong> que te enviamos por WhatsApp para continuar desde tu celular.
      </p>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold" for="password">Contraseña</label>
          <input type="password" class="form-control form-control-lg text-center"
                 id="password" name="password" inputmode="text" autocomplete="one-time-code"
                 placeholder="••••••••" required autofocus>
        </div>
        <button type="submit" class="btn btn-success btn-lg w-100">
          <i class="bi bi-unlock"></i> Abrir formulario
        </button>
      </form>
    </div>
  </div>
</body>
</html>
